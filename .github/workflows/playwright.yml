name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Ensure Playwright browsers are installed
      run: python -m playwright install --with-deps ${{ matrix.browser }}

    - name: Run Playwright tests
      run: |
        PYTHONPATH=. pytest --browser_name=${{ matrix.browser }} --headless_mode=true --html=report-${{ matrix.browser }}.html --self-contained-html
      
    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.browser }}
        path: report-${{ matrix.browser }}.html
        retention-days: 30
